services:
  node:
    build:
      context: ../
      args:
        PROJECT: coreum
        PROJECT_BIN: txd
        PROJECT_DIR: .core/coreum-mainnet-1
        REPOSITORY: https://github.com/tokenize-x/tx-chain
        VERSION: v6.0.1
        BUILD_METHOD: binary
        BINARY_URL: https://github.com/tokenize-x/tx-chain/releases/download/v6.0.1/txd-linux-amd64
    ports:
      - '26656:26656'
      - '26657:26657'
      - '1317:1317'
    volumes:
      - ./node-data:/root/.core/coreum-mainnet-1
